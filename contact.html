<head>
  <meta charset = "utf-8" />
  <title>Contact - Yamli Mobile</title>
<meta name="msapplication-TileColor" content="#3b5165">
<meta name="msapplication-TileImage" content="/images/favicon/favicon-32x32.png">
<meta name="theme-color" content="#3b5165">
<meta name='viewport' content='width=device-width, initial-scale=1.0, user-scalable=0' />
<meta name="mobile-web-app-capable" content="yes"> 
<meta name="apple-mobile-web-app-capable" content="yes"> 
<meta name="apple-mobile-web-app-status-bar-style" content="black"> 
<meta name="apple-mobile-web-app-title" content="Yamli Mobile"> 
<link rel="apple-touch-icon" sizes="180x180" href="/images/favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/images/favicon/favicon-16x16.png">

<link rel="stylesheet" href="./style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

<body>
<div class="container">
  <div class="box" id="contact">
    <h1>Contact and Feedback</h1>
    <p class="info">We'd love to hear from you! Send us your feedback, suggestions, or report any issues.</p>
    <form action="https://formspree.io/f/xqeggqnr" method="post">
      <label for="email">Email:</label><br>
      <input type="email" id="email" name="email" placeholder="your@email.com" required><br>
      <label for="subject">Subject:</label><br>
      <input type="text" id="subject" name="subject" placeholder="How can we help?" required><br>
      <label for="message">Message:</label><br>
      <textarea id="message" name="message" rows="8" placeholder="Your message..." required></textarea><br><br>
      <input type="hidden" name="_next" value="./thanks.html">
      <input type="hidden" name="_subject" value="New message from Yamli Mobile">
      <input id="submitbtn" type="submit" value="Send Message">
    </form>
  </div>

  <div class="box" id="info">
    <h1>Other Ways to Reach Us</h1>
    <p class="info">Email: support@yamlimobile.com</p>
    <p class="info">Follow us on social media for updates and tips.</p>
  </div>
</div>

<footer>
<div class="footer">
<a class="active" href="./index.html"><img class="logo" src="./images/favicon/ms-icon-144x144.png" >Yamli Mobile</a>
<a href="./contact.html"><img class="img" src="./icon/contact.svg"></a>
<a onclick="notifyMe()"><img class="img" src="./icon/bell.svg"></a>
<a href="./index.html"><img class="img" src="./icon/home.svg"></a>
</footer>

</body>
</html>

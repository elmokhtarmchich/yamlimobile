# Cloudflare Workers Configuration
name = "yamli-push-notifications"
main = "workers/push-notifications.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Enable bundling for npm dependencies
[build]
command = "cd workers && npm install"

# KV Namespace for storing subscriptions
[[kv_namespaces]]
binding = "PUSH_SUBSCRIPTIONS"
id = "130d802e56d449eb950c52e789b69f3d"


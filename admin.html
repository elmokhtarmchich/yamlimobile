<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yamli Mobile - Admin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Amiri', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .admin-container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 28px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 600;
    }
    
    input, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      transition: border-color 0.3s ease;
    }
    
    input:focus, textarea:focus {
      outline: none;
      border-color: #dbb44f;
    }
    
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    
    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #dbb44f 0%, #c9a03d 100%);
      color: #333;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(219, 180, 79, 0.4);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      display: none;
    }
    
    .status.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    
    .status.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
    
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #666;
      text-decoration: none;
    }
    
    .back-link:hover {
      color: #dbb44f;
    }
    
    .login-container {
      text-align: center;
    }
    
    .login-container input {
      margin-bottom: 15px;
    }
    
    .hidden {
      display: none !important;
    }
    
    .error-msg {
      color: #dc3545;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <!-- Password Login Screen -->
    <div id="loginScreen" class="login-container">
      <h1>🔐 تسجيل الدخول</h1>
      <div class="form-group">
        <label for="adminPassword">كلمة المرور:</label>
        <input type="password" id="adminPassword" placeholder="أدخل كلمة المرور">
      </div>
      <button class="btn" onclick="checkPassword()">دخول</button>
      <div id="loginError" class="error-msg hidden">كلمة المرور غير صحيحة</div>
      <a href="./index.html" class="back-link">← العودة للرئيسية</a>
    </div>
    
    <!-- Admin Panel (Hidden by default) -->
    <div id="adminPanel" class="hidden">
      <h1>📢 إرسال إشعار</h1>
    
    <div class="form-group">
      <label for="notifTitle">عنوان الإشعار:</label>
      <input type="text" id="notifTitle" placeholder="Yamli Mobile" value="Yamli Mobile">
    </div>
    
    <div class="form-group">
      <label for="notifBody">نص الإشعار:</label>
      <textarea id="notifBody" placeholder="اكتب رسالتك هنا..."></textarea>
    </div>
    
    <button class="btn" onclick="sendNotification()">إرسال الإشعار</button>
    
    <div id="status" class="status"></div>
    
    <a href="./index.html" class="back-link">← العودة للرئيسية</a>
    </div>
  </div>

  <script src="./config.js"></script>
  <script>
    // Fallback password if config.js is not loaded (e.g., on GitHub Pages)
    if (typeof ADMIN_PASSWORD === 'undefined') {
      const ADMIN_PASSWORD = 'yamli2024';
    }
    
    // Check for notification support
    const notificationsSupported = 'Notification' in window && 'serviceWorker' in navigator;
    
    // Password check function
    function checkPassword() {
      const input = document.getElementById('adminPassword').value;
      const error = document.getElementById('loginError');
      
      // Use the global ADMIN_PASSWORD or fallback
      const correctPassword = typeof ADMIN_PASSWORD !== 'undefined' ? ADMIN_PASSWORD : 'yamli2024';
      
      if (input === correctPassword) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
      } else {
        error.classList.remove('hidden');
        document.getElementById('adminPassword').value = '';
      }
    }
    
    // Allow Enter key to submit password
    document.getElementById('adminPassword')?.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') checkPassword();
    });
    
    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = 'status ' + type;
      setTimeout(() => {
        status.className = 'status';
      }, 3000);
    }
    
    // Store subscription in localStorage for demo purposes
    // In production, send this to your backend server
    async function subscribeDevice() {
      if (!notificationsSupported) {
        showStatus('الإشعارات غير مدعومة في هذا المتصفح', 'error');
        return;
      }
      
      // Request permission if not granted
      if (Notification.permission !== 'granted') {
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') {
          showStatus('تم رفض الإذن للإشعارات', 'error');
          return false;
        }
      }
      
      // Get service worker registration
      const registration = await navigator.serviceWorker.ready;
      
      // Subscribe to push
      try {
        const subscription = await registration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(
            'BL6iSz-YuFdNzbBS7rVLzmJDw0mNiNX-uKXDuPTuPoDXI6qAZiErTQ04FmuD_zoZRXGCaFKrj74OIqcclUgs6Vk'
          )
        });
        
        // Store subscription locally (in real app, send to backend)
        const subscriptions = JSON.parse(localStorage.getItem('pushSubscriptions') || '[]');
        const subData = JSON.stringify(subscription);
        
        if (!subscriptions.includes(subData)) {
          subscriptions.push(subData);
          localStorage.setItem('pushSubscriptions', JSON.stringify(subscriptions));
        }
        
        return subscription;
      } catch (err) {
        console.error('Subscription failed:', err);
        return null;
      }
    }
    
    // Helper function to convert VAPID key
    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding)
        .replace(/\-/g, '+')
        .replace(/_/g, '/');
      
      const rawData = window.atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      
      for (let i = 0; i < rawData.length; ++i) {
        outputArray[i] = rawData.charCodeAt(i);
      }
      return outputArray;
    }
    
    // Cloudflare Worker URL - Must match index.js
    const CLOUDFLARE_WORKER_URL = 'https://yamli-push-notifications.elmokhtar-mchich.workers.dev';
    
    // Get subscriber count from Cloudflare
    async function getSubscriberCount() {
      try {
        const response = await fetch(`${CLOUDFLARE_WORKER_URL}/subscribers`);
        if (response.ok) {
          const data = await response.json();
          return data.count;
        }
      } catch (err) {
        console.warn('Could not get subscriber count:', err);
      }
      return 0;
    }
    
    async function sendNotification() {
      console.log('sendNotification called');
      
      const title = document.getElementById('notifTitle').value || 'Yamli Mobile';
      const body = document.getElementById('notifBody').value;
      
      console.log('Title:', title, 'Body:', body);
      
      if (!body.trim()) {
        showStatus('الرجاء كتابة نص الإشعار', 'error');
        return;
      }
      
      showStatus('جاري الإرسال...', 'success');
      
      // Subscribe this device first
      try {
        await subscribeDevice();
        console.log('Device subscribed');
      } catch (subErr) {
        console.warn('Subscribe error:', subErr);
      }
      
      // Try to broadcast via Cloudflare Worker
      try {
        console.log('Sending to Cloudflare:', CLOUDFLARE_WORKER_URL);
        
        const response = await fetch(`${CLOUDFLARE_WORKER_URL}/broadcast`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title: title,
            body: body,
            icon: './images/favicon/ms-icon-144x144.png',
            adminPassword: 'yamli2024'
          })
        });
        
        console.log('Cloudflare response:', response.status);
        
        if (response.ok) {
          const result = await response.json();
          console.log('Cloudflare result:', result);
          
          if (result.success) {
            showStatus(`تم إرسال الإشعار! الأجهزة: ${result.sent}/${result.sent + result.failed}`, 'success');
            document.getElementById('notifBody').value = '';
          } else {
            showStatus('خطأ: ' + result.error, 'error');
          }
        } else {
          const errorText = await response.text();
          console.error('Cloudflare error:', errorText);
          throw new Error('Cloudflare error: ' + response.status);
        }
      } catch (err) {
        console.error('Broadcast failed, trying local:', err);
        
        // Fallback: Send locally
        try {
          const registration = await navigator.serviceWorker.ready;
          await registration.showNotification(title, {
            body: body,
            icon: './images/favicon/ms-icon-144x144.png',
            tag: 'admin-notification'
          });
          showStatus('تم الإرسال محلياً فقط', 'success');
          document.getElementById('notifBody').value = '';
        } catch (localErr) {
          console.error('Local notification failed:', localErr);
          showStatus('خطأ: ' + localErr.message, 'error');
        }
      }
    }
    
    // Load subscriber count on page load
    getSubscriberCount().then(count => {
      console.log('Cloudflare subscribers:', count);
    });
    
    // Register service worker for PWA support
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
